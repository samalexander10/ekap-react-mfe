version: "3.9"

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    platform: linux/arm64
    environment:
      POSTGRES_DB: ekap
      POSTGRES_USER: ekap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ekap_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ekap"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    platform: linux/arm64
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    platform: linux/arm64
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    platform: linux/arm64
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/init-topics.sh:/init-topics.sh
    command: ["bash", "/init-topics.sh"]

  weaviate:
    image: semitechnologies/weaviate:1.24.10
    platform: linux/arm64
    environment:
      QUERY_DEFAULTS_LIMIT: 20
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    platform: linux/arm64
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ekap_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-ekap_minio_secret_dev}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Services ─────────────────────────────────────────────────────────
  chat-service:
    build:
      context: ./backend/chat-service
      dockerfile: Dockerfile
    platform: linux/arm64
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POSTGRES_URL: postgresql+asyncpg://ekap:${POSTGRES_PASSWORD:-ekap_dev}@postgres:5432/ekap
      REDIS_URL: redis://redis:6379
      WEAVIATE_URL: http://weaviate:8080
      HR_SERVICE_URL: http://hr-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    restart: unless-stopped

  hr-service:
    build:
      context: ./backend/hr-service
      dockerfile: Dockerfile
    platform: linux/arm64
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POSTGRES_URL: r2dbc:postgresql://ekap:${POSTGRES_PASSWORD:-ekap_dev}@postgres:5432/ekap
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ekap_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-ekap_minio_secret_dev}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  doc-processor:
    build:
      context: ./backend/doc-processor
      dockerfile: Dockerfile
    platform: linux/arm64
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WEAVIATE_URL: http://weaviate:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ekap_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-ekap_minio_secret_dev}
    depends_on:
      kafka:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend Services ────────────────────────────────────────────────────────
  chat-shell:
    build:
      context: ./frontend/shell
      dockerfile: Dockerfile
    platform: linux/arm64
    ports:
      - "3000:80"
    depends_on:
      - chat-service
    restart: unless-stopped

  hr-namechange:
    build:
      context: ./frontend/remotes/hr-namechange
      dockerfile: Dockerfile
    platform: linux/arm64
    ports:
      - "3001:80"
    restart: unless-stopped

volumes:
  postgres_data:
  zookeeper_data:
  kafka_data:
  weaviate_data:
  minio_data:
